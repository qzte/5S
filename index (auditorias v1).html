<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12211c">
<title>Auditoria 5S · Supermercados Kaizen</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f1ea; --ink:#1d2a24; --panel:#ffffff; --line:#d9d3c5;
  --green:#1f6f50; --green-dk:#12211c; --amber:#c98a1b; --red:#b03a2e;
  --accent:#e8500a; --muted:#6d7a72;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--bg);color:var(--ink);
  background-image:radial-gradient(circle at 15% 10%,rgba(31,111,80,.07),transparent 45%),
  repeating-linear-gradient(45deg,transparent 0 14px,rgba(29,42,36,.018) 14px 15px);
  min-height:100vh;padding-bottom:90px}
h1,h2,h3,.btn,.tab,.chip,.badge,th,.pill{font-family:'Archivo',sans-serif}
header{background:var(--green-dk);color:#f4f1ea;padding:18px 20px 14px;
  border-bottom:4px solid var(--accent)}
header h1{font-weight:900;font-size:1.25rem;letter-spacing:.5px;text-transform:uppercase}
header small{color:#9db8a9;font-family:'Archivo',sans-serif;font-size:.7rem;letter-spacing:2px;text-transform:uppercase}
nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--green-dk);z-index:50;
  padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:14px 4px;text-align:center;color:#8fa89a;font-size:.72rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;background:none;border:0;cursor:pointer;
  border-top:3px solid transparent}
.tab.active{color:#fff;border-top-color:var(--accent)}
main{max-width:760px;margin:0 auto;padding:18px 14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;box-shadow:0 2px 0 rgba(29,42,36,.06)}
label{display:block;font-family:'Archivo',sans-serif;font-size:.7rem;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
input,select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:9px;
  font-family:inherit;font-size:1rem;background:#fdfcf9;margin-bottom:12px}
input:focus,select:focus{outline:2px solid var(--green);border-color:var(--green)}
.row{display:flex;gap:10px}.row>*{flex:1}
.pillar{margin:22px 0 8px;display:flex;align-items:center;gap:10px}
.pillar h2{font-size:.95rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:var(--green)}
.pillar .n{background:var(--green);color:#fff;width:26px;height:26px;border-radius:50%;
  display:grid;place-items:center;font-family:'Archivo';font-weight:900;font-size:.8rem}
.item{border-left:4px solid var(--line);padding-left:12px;margin-bottom:16px}
.item .q{font-size:.95rem;margin:2px 0 4px}
.item .meta{font-size:.7rem;color:var(--muted);font-family:'Archivo';letter-spacing:.5px}
.opts{display:flex;gap:8px;margin-top:8px}
.opt{flex:1;border:1.5px solid var(--line);border-radius:9px;padding:9px 4px;text-align:center;
  font-family:'Archivo';font-size:.72rem;font-weight:700;cursor:pointer;background:#fdfcf9;
  color:var(--muted);letter-spacing:.3px}
.opt small{display:block;font-size:.62rem;font-weight:500;margin-top:2px;letter-spacing:0}
.opt.s0.sel{background:var(--red);border-color:var(--red);color:#fff}
.opt.s1.sel{background:var(--amber);border-color:var(--amber);color:#fff}
.opt.s2.sel{background:var(--green);border-color:var(--green);color:#fff}
.item.done{border-left-color:var(--green)}
.btn{display:block;width:100%;padding:15px;border:0;border-radius:11px;background:var(--accent);
  color:#fff;font-weight:900;font-size:.95rem;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;margin-top:8px}
.btn.ghost{background:transparent;color:var(--green);border:2px solid var(--green)}
.btn.small{padding:9px;font-size:.75rem;width:auto;display:inline-block}
.score-hero{background:var(--green-dk);color:#f4f1ea;text-align:center;border:0}
.score-hero .big{font-family:'Archivo';font-weight:900;font-size:3.6rem;line-height:1}
.score-hero .lbl{font-family:'Archivo';font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:#9db8a9}
.badge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:.7rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;margin-top:8px}
.b-ok{background:var(--green);color:#fff}.b-mid{background:var(--amber);color:#fff}.b-bad{background:var(--red);color:#fff}
.bar{height:10px;background:#e6e1d4;border-radius:99px;overflow:hidden;margin:4px 0 12px}
.bar>i{display:block;height:100%;background:var(--green);border-radius:99px}
.bar>i.mid{background:var(--amber)}.bar>i.bad{background:var(--red)}
.stat-row{display:flex;justify-content:space-between;font-size:.82rem;font-family:'Archivo';font-weight:700}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:left;
  padding:6px 8px;border-bottom:2px solid var(--line)}
td{padding:9px 8px;border-bottom:1px solid var(--line)}
.pill{padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:900;color:#fff}
canvas{width:100%!important}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-style:italic}
.hidden{display:none}
.svc-chip{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);
  border-radius:99px;padding:6px 6px 6px 14px;margin:0 6px 8px 0;font-family:'Archivo';font-size:.8rem;font-weight:700}
.svc-chip button{border:0;background:var(--red);color:#fff;border-radius:50%;width:20px;height:20px;cursor:pointer;font-weight:900}
@media print{
  nav,header,.no-print{display:none!important}
  body{background:#fff;padding:0}
  .card{box-shadow:none;break-inside:avoid}
  #view-report{display:block!important}
  main{max-width:100%}
}
</style>
</head>
<body>
<header>
  <small>Kaizen · Lista de Verificação 5S</small>
  <h1>Auditoria de Supermercados</h1>
</header>

<main>
<!-- ============ NOVA AUDITORIA ============ -->
<section id="view-audit">
  <div class="card">
    <label>Serviço / Supermercado</label>
    <select id="f-service"></select>
    <div class="row">
      <div><label>Data</label><input type="date" id="f-date"></div>
      <div><label>Nota (auto)</label><input id="f-live" disabled value="—"></div>
    </div>
    <div class="row">
      <div><label>Repositor</label><input id="f-repo" placeholder="Nome"></div>
      <div><label>Verificador</label><input id="f-verif" placeholder="Nome"></div>
    </div>
  </div>
  <div id="items"></div>
  <button class="btn" id="btn-save">Guardar auditoria</button>
</section>

<!-- ============ HISTÓRICO ============ -->
<section id="view-history" class="hidden">
  <div id="hist-list"></div>
</section>

<!-- ============ ANÁLISE ============ -->
<section id="view-stats" class="hidden">
  <div class="card"><h3>Evolução da nota</h3><canvas id="ch-evo" height="180"></canvas></div>
  <div class="card"><h3>Comparação entre serviços</h3><div id="cmp-svc"></div></div>
  <div class="card"><h3>Pontos fracos por pilar 5S</h3><div id="cmp-pilar"></div></div>
  <div class="card"><h3>Desempenho por responsável</h3><div id="cmp-resp"></div></div>
</section>

<!-- ============ RELATÓRIO ============ -->
<section id="view-report" class="hidden"></section>

<!-- ============ CONFIG ============ -->
<section id="view-cfg" class="hidden">
  <div class="card">
    <h3 style="margin-bottom:10px">Serviços</h3>
    <div id="svc-list"></div>
    <div class="row"><input id="svc-new" placeholder="Novo serviço (ex.: UCIP 11120)">
    <button class="btn small ghost" onclick="addSvc()">Adicionar</button></div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:10px">Dados</h3>
    <button class="btn small ghost" onclick="exportJson()">Exportar dados (JSON)</button>
    <p style="font-size:.78rem;color:var(--muted);margin-top:10px">Os dados ficam guardados apenas neste dispositivo. Faça exportações regulares como cópia de segurança.</p>
  </div>
</section>
</main>

<nav>
  <button class="tab active" data-v="audit">Auditar</button>
  <button class="tab" data-v="history">Histórico</button>
  <button class="tab" data-v="stats">Análise</button>
  <button class="tab" data-v="cfg">Config</button>
</nav>

<script>
/* ---------- Definição do checklist (da folha Excel) ---------- */
const PILLARS=["Triagem","Arrumação","Limpeza","Normalização","Disciplina"];
const RESP={U:"Utilizadores",M:"Manutenção",R:"Reposição","U+R":"Utilizador e Repositor"};
const ITEMS=[
 {p:0,n:1,t:"Materiais",r:"U",c:"Nº de artigos extra acordo no supermercado",o:["> 3","< 3","Nenhum"]},
 {p:0,n:2,t:"Artigos",r:"M",c:"Nº de artigos inactivos em supermercado",o:["> 2","< 2","Nenhum"]},
 {p:0,n:3,t:"Quantidades",r:"U+R",c:"Nº de kanbans com quantidades excessivas",o:["≥ 4","≤ 3","Nenhum"]},
 {p:0,n:4,t:"Piso, corredores",r:"U",c:"Nº de estantes com dificuldade de reabastecimento",o:["> 1","1","Nenhuma"]},
 {p:1,n:5,t:"Localizações",r:"M",c:"Nº de artigos sem etiqueta de posição",o:["≥ 5","< 5","Nenhum"]},
 {p:1,n:6,t:"Estantes / Prateleiras",r:"M",c:"Nº de estantes/prateleiras sem identificação visual",o:["≥ 3","< 3","Nenhuma"]},
 {p:1,n:7,t:"Caixas",r:"R",c:"Nº de KB's vazios mal arrumados na zona de reposição",o:["≥ 4","< 4","Nenhuma"]},
 {p:1,n:8,t:"Material em Rutura",r:"R",c:"Nº de artigos em rutura mal identificados",o:["≥ 1","—","Nenhum"]},
 {p:2,n:9,t:"Estantes",r:"U",c:"Nº de prateleiras danificadas por mau uso",o:["> 2","≤ 2","Nenhuma"]},
 {p:2,n:10,t:"Caixas e Kanbans",r:"U+R",c:"Nº de kanbans/caixas em mau estado",o:["≥ 8","< 8","Nenhuma"]},
 {p:2,n:11,t:"Limpeza",r:"U",c:"Nº de caixas sujas",o:["≥ 3","< 3","Nenhuma"]},
 {p:2,n:12,t:"Temperatura",r:"U",c:"Verificação de temperatura e dispositivos necessários",o:["Inexistente","Parcial","Conforme"]},
 {p:3,n:13,t:"Espaços",r:"U",c:"O espaço do supermercado está arrumado e limpo",o:["Não","Parcial","Sim"]},
 {p:3,n:14,t:"Caixas",r:"M",c:"Nº de caixas não adaptadas ao tamanho do artigo",o:["≥ 5","< 5","Nenhuma"]},
 {p:3,n:15,t:"Normas de Picking",r:"M",c:"Norma de picking, ficha, indicadores e index visíveis e atualizados",o:["0","1–3","4"]},
 {p:4,n:16,t:"Localizações",r:"U+R",c:"Nº de artigos fora da localização do Index",o:["≥ 5","< 5","Nenhum"]},
 {p:4,n:17,t:"Picking",r:"U",c:"Nº de artigos onde a norma de picking não é respeitada",o:["≥ 5","< 5","Nenhum"]},
 {p:4,n:18,t:"Reposição",r:"R",c:"Nº de kanbans onde a norma de reposição não é respeitada",o:["≥ 5","< 5","Nenhum"]},
 {p:4,n:19,t:"Validades",r:"U",c:"Nº de kanbans fora de validade",o:["≥ 2","≤ 1","0"]},
];
const MAX=ITEMS.length*2;
const LBL=["Mau","Oportunidade","Excelente"];

/* ---------- Estado ---------- */
const load=(k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d));
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let audits=load("audits",[]);
let services=load("services",["UCIP (11120)"]);
let answers={};

/* ---------- Navegação ---------- */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===t));
  ["audit","history","stats","report","cfg"].forEach(v=>
    document.getElementById("view-"+v).classList.toggle("hidden",v!==t.dataset.v));
  if(t.dataset.v==="history")renderHist();
  if(t.dataset.v==="stats")renderStats();
  if(t.dataset.v==="cfg")renderCfg();
});

/* ---------- Formulário ---------- */
function renderForm(){
  document.getElementById("f-date").value=new Date().toISOString().slice(0,10);
  const sel=document.getElementById("f-service");
  sel.innerHTML=services.map(s=>`<option>${s}</option>`).join("");
  const box=document.getElementById("items");box.innerHTML="";
  let curP=-1;
  ITEMS.forEach((it,i)=>{
    if(it.p!==curP){curP=it.p;
      box.insertAdjacentHTML("beforeend",
      `<div class="pillar"><span class="n">${curP+1}</span><h2>${PILLARS[curP]}</h2></div>`);}
    box.insertAdjacentHTML("beforeend",`
    <div class="card item" id="it${i}">
      <div class="meta">Nº ${it.n} · ${it.t} · Resp.: ${RESP[it.r]}</div>
      <div class="q">${it.c}</div>
      <div class="opts">${[0,1,2].map(s=>
        `<button class="opt s${s}" onclick="pick(${i},${s},this)">${LBL[s]}<small>${it.o[s]}</small></button>`).join("")}
      </div>
    </div>`);
  });
}
function pick(i,s,el){
  answers[i]=s;
  el.parentElement.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
  el.classList.add("sel");
  document.getElementById("it"+i).classList.add("done");
  const pts=Object.values(answers).reduce((a,b)=>a+b,0);
  document.getElementById("f-live").value=Math.round(pts/MAX*100)+" / 100";
}
document.getElementById("btn-save").onclick=()=>{
  if(Object.keys(answers).length<ITEMS.length){alert("Faltam "+(ITEMS.length-Object.keys(answers).length)+" itens por avaliar.");return;}
  const a={id:Date.now(),service:document.getElementById("f-service").value,
    date:document.getElementById("f-date").value,
    repo:document.getElementById("f-repo").value,verif:document.getElementById("f-verif").value,
    scores:ITEMS.map((_,i)=>answers[i])};
  audits.push(a);save("audits",audits);
  answers={};renderForm();document.getElementById("f-live").value="—";
  openReport(a);
};

/* ---------- Cálculos ---------- */
const total=a=>Math.round(a.scores.reduce((x,y)=>x+y,0)/MAX*100);
function byPillar(a){return PILLARS.map((p,pi)=>{
  const idx=ITEMS.map((it,i)=>it.p===pi?i:-1).filter(i=>i>=0);
  return{name:p,pct:Math.round(idx.reduce((s,i)=>s+a.scores[i],0)/(idx.length*2)*100)};});}
function byResp(a){return Object.keys(RESP).map(r=>{
  const idx=ITEMS.map((it,i)=>it.r===r?i:-1).filter(i=>i>=0);
  return{name:RESP[r],pct:Math.round(idx.reduce((s,i)=>s+a.scores[i],0)/(idx.length*2)*100)};});}
const badge=p=>p>=80?["b-ok","Excelente"]:p>=50?["b-mid","Com oportunidade"]:["b-bad","Crítico"];
const barCls=p=>p>=80?"":p>=50?"mid":"bad";

/* ---------- Relatório / PDF ---------- */
function openReport(a){
  const [bc,bt]=badge(total(a));
  const worst=ITEMS.map((it,i)=>({it,s:a.scores[i]})).filter(x=>x.s<2);
  document.getElementById("view-report").innerHTML=`
  <div class="card score-hero"><div class="lbl">Auditoria 5S · ${a.service} · ${a.date}</div>
    <div class="big">${total(a)}<span style="font-size:1.2rem">/100</span></div>
    <span class="badge ${bc}">${bt}</span>
    <div style="font-size:.78rem;margin-top:10px;color:#9db8a9">Repositor: ${a.repo||"—"} · Verificador: ${a.verif||"—"}</div>
  </div>
  <div class="card"><h3 style="margin-bottom:10px">Por pilar 5S</h3>
    ${byPillar(a).map(p=>`<div class="stat-row"><span>${p.name}</span><span>${p.pct}%</span></div>
    <div class="bar"><i class="${barCls(p.pct)}" style="width:${p.pct}%"></i></div>`).join("")}</div>
  <div class="card"><h3 style="margin-bottom:10px">Por responsável</h3>
    ${byResp(a).map(p=>`<div class="stat-row"><span>${p.name}</span><span>${p.pct}%</span></div>
    <div class="bar"><i class="${barCls(p.pct)}" style="width:${p.pct}%"></i></div>`).join("")}</div>
  <div class="card"><h3 style="margin-bottom:10px">Itens a melhorar (${worst.length})</h3>
    ${worst.length?`<table><tr><th>Nº</th><th>Item</th><th>Avaliação</th></tr>${worst.map(x=>
      `<tr><td>${x.it.n}</td><td>${x.it.t}<br><small style="color:var(--muted)">${x.it.c}</small></td>
      <td><span class="pill" style="background:${x.s===0?'var(--red)':'var(--amber)'}">${LBL[x.s]}</span></td></tr>`).join("")}</table>`
      :`<p>Sem não-conformidades. 🎉</p>`}</div>
  <button class="btn no-print" onclick="window.print()">Gerar PDF</button>
  <button class="btn ghost no-print" onclick="document.querySelector('[data-v=history]').click()">Voltar</button>`;
  ["audit","history","stats","cfg"].forEach(v=>document.getElementById("view-"+v).classList.add("hidden"));
  document.getElementById("view-report").classList.remove("hidden");
  window.scrollTo(0,0);
}

/* ---------- Histórico ---------- */
function renderHist(){
  const box=document.getElementById("hist-list");
  if(!audits.length){box.innerHTML=`<p class="empty">Ainda sem auditorias guardadas.</p>`;return;}
  box.innerHTML=[...audits].sort((a,b)=>b.date.localeCompare(a.date)).map(a=>{
    const[bc,bt]=badge(total(a));
    return`<div class="card"><div class="stat-row"><span>${a.service}</span><span>${total(a)}/100</span></div>
    <div style="font-size:.78rem;color:var(--muted)">${a.date} · Verif.: ${a.verif||"—"}</div>
    <span class="badge ${bc}">${bt}</span>
    <div style="margin-top:8px"><button class="btn small ghost" onclick='openReport(${JSON.stringify(a)})'>Relatório</button>
    <button class="btn small ghost" style="border-color:var(--red);color:var(--red)" onclick="delAudit(${a.id})">Apagar</button></div></div>`;}).join("");
}
function delAudit(id){if(!confirm("Apagar esta auditoria?"))return;
  audits=audits.filter(a=>a.id!==id);save("audits",audits);renderHist();}

/* ---------- Análise ---------- */
function avg(arr){return arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;}
function renderStats(){
  const evo=[...audits].sort((a,b)=>a.date.localeCompare(b.date));
  const cv=document.getElementById("ch-evo"),ctx=cv.getContext("2d");
  const W=cv.width=cv.clientWidth*2,H=cv.height=360;ctx.clearRect(0,0,W,H);
  if(evo.length){
    ctx.strokeStyle="#d9d3c5";ctx.lineWidth=2;
    [0,25,50,75,100].forEach(v=>{const y=H-30-(v/100)*(H-60);
      ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(W-10,y);ctx.stroke();
      ctx.fillStyle="#6d7a72";ctx.font="20px Archivo";ctx.fillText(v,6,y+6);});
    ctx.strokeStyle="#1f6f50";ctx.lineWidth=5;ctx.beginPath();
    evo.forEach((a,i)=>{const x=40+(evo.length===1?.5:i/(evo.length-1))*(W-60);
      const y=H-30-(total(a)/100)*(H-60);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();
    evo.forEach((a,i)=>{const x=40+(evo.length===1?.5:i/(evo.length-1))*(W-60);
      const y=H-30-(total(a)/100)*(H-60);
      ctx.fillStyle="#e8500a";ctx.beginPath();ctx.arc(x,y,8,0,7);ctx.fill();});
  }
  const bars=(pairs)=>pairs.map(([n,p])=>`<div class="stat-row"><span>${n}</span><span>${p}%</span></div>
    <div class="bar"><i class="${barCls(p)}" style="width:${p}%"></i></div>`).join("")||`<p class="empty">Sem dados.</p>`;
  document.getElementById("cmp-svc").innerHTML=bars(
    services.filter(s=>audits.some(a=>a.service===s))
    .map(s=>[s,avg(audits.filter(a=>a.service===s).map(total))]));
  document.getElementById("cmp-pilar").innerHTML=bars(
    PILLARS.map((p,i)=>[p,avg(audits.map(a=>byPillar(a)[i].pct))]));
  document.getElementById("cmp-resp").innerHTML=bars(
    Object.values(RESP).map((r,i)=>[r,avg(audits.map(a=>byResp(a)[i].pct))]));
}

/* ---------- Config ---------- */
function renderCfg(){
  document.getElementById("svc-list").innerHTML=services.map((s,i)=>
  `<span class="svc-chip">${s}<button onclick="rmSvc(${i})">×</button></span>`).join("");
}
function addSvc(){const v=document.getElementById("svc-new").value.trim();
  if(!v)return;services.push(v);save("services",services);
  document.getElementById("svc-new").value="";renderCfg();renderForm();}
function rmSvc(i){services.splice(i,1);save("services",services);renderCfg();renderForm();}
function exportJson(){
  const blob=new Blob([JSON.stringify({audits,services},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="auditorias5s_"+new Date().toISOString().slice(0,10)+".json";a.click();}

renderForm();
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
